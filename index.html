<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendy FX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#6a11cb,#2575fc,#ff4d6d,#00c9a7);
    background-size:400% 400%;
    animation:bgAnimation 12s ease infinite;
    transition:0.4s;
    overflow:hidden;
}

@keyframes bgAnimation{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.theme-btn{
    position:absolute;
    top:20px;
    right:20px;
    border:none;
    padding:10px 15px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    background:white;
    transition:0.3s;
}

.theme-btn:hover{
    transform:scale(1.1);
}

.profile{
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

h1{
    margin-top:15px;
    color:white;
    font-size:2.3rem;
    text-shadow:0 0 15px rgba(255,255,255,0.6);
}

.tagline{
    color:white;
    margin-top:8px;
    font-size:15px;
}

.welcome{
    margin-top:25px;
    color:white;
}

.welcome h2{
    font-size:1.5rem;
}

.welcome p{
    margin-top:10px;
    opacity:0.9;
}

.insta-btn{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    padding:12px 28px;
    border-radius:50px;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,75,43,0.5);
}

.insta-btn:hover{
    transform:translateY(-4px) scale(1.05);
}

.discord-btn{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    padding:12px 28px;
    border-radius:50px;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,75,43,0.5)
}
.discord-btn:hover{
    transform:translateY(-4px) scale(1.05);
}

.dark{
    background:#111;
}

.dark .container{
    background:rgba(0,0,0,0.4);
}

.dark .theme-btn{
    background:#222;
    color:white;
}

@media(max-width:500px){

    .profile{
        width:120px;
        height:120px;
    }

    h1{
        font-size:2rem;
    }

}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

    <!-- Change image URL below -->
    <img src="C:\Users\MADDY\Pictures\logoo.jpg" alt="Trendy FX" class="profile">

    <h1>Trendy FX</h1>

    <p class="tagline">Creative • Stylish • Trending</p>

    <a class="insta-btn"
       href="https://www.instagram.com/trendy._.b?igsh=MW1kZmU1Z3F4bzZlMg=="
       target="_blank">
       Instagram
    </a>
    <a class="discord-btn"
    href="https://discord.gg/2MDPaHkfu"
    target="_blank">
    Discord
    </a>

    <div class="welcome">
        <h2>Welcome to Trendy FX</h2>
        <p>
            Here, trading isn’t a gamble, it’s a skill you master, step by step, with clarity, focus, and consistency.
        </p>
    </div>

</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("dark");

    let btn = document.querySelector(".theme-btn");

    if(document.body.classList.contains("dark")){
        btn.innerHTML="☀️";
    }else{
        btn.innerHTML="🌙";
    }
}
</script>

</body>
</html>
